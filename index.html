<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vega closet · your feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue:#0077CC; --cyan:#44BBDD; --sand:#E8E4DC; --ink:#0a0a0a;
    --glass:rgba(255,255,255,0.07); --glass-hi:rgba(255,255,255,0.12);
    --line:rgba(255,255,255,0.16); --text:#f4f6f8; --muted:rgba(244,246,248,0.6);
    --cyan2:#44BBDD; --warn:#E8C24A; --ease:400ms cubic-bezier(0.2,0.7,0.2,1);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:var(--text); text-transform:lowercase;
    background:
      radial-gradient(1100px circle at 18% -8%, rgba(0,119,204,0.5), rgba(68,187,221,0.2) 38%, rgba(232,228,220,0.04) 72%, transparent 100%),
      radial-gradient(900px circle at 95% 4%, rgba(68,187,221,0.16), transparent 60%),
      var(--ink);
    background-attachment:fixed; min-height:100vh; padding:0 0 80px; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1080px; margin:0 auto; padding:30px 24px 0; }
  header.top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:8px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .dot { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--blue),var(--cyan)); box-shadow:0 0 24px rgba(68,187,221,0.5); }
  .brand h1 { font-size:19px; font-weight:600; }
  .brand span { display:block; font-size:11.5px; color:var(--muted); font-weight:400; }
  .stat { font-size:12.5px; color:var(--muted); text-align:right; line-height:1.6; }
  .stat b { color:var(--cyan); font-weight:600; }

  .note {
    background:var(--glass); border:1px solid var(--line); border-left:3px solid var(--cyan);
    border-radius:14px; padding:15px 18px; margin:18px 0 26px; font-size:14px; line-height:1.65; color:var(--text);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); max-width:820px;
  }
  .filters { display:flex; gap:9px; flex-wrap:wrap; margin:0 0 22px; }
  .filt { font-family:inherit; font-size:13px; font-weight:600; border-radius:999px; padding:8px 15px; cursor:pointer; border:1px solid var(--line); background:var(--glass-hi); color:var(--text); text-transform:lowercase; transition:all var(--ease); }
  .filt:hover { border-color:rgba(255,255,255,0.4); }
  .filt.on { background:var(--cyan); color:#042430; border-color:var(--cyan); }
  .tabrow { display:flex; gap:10px; flex-wrap:wrap; margin:2px 0 16px; }
  .tab { font-family:inherit; font-size:14.5px; font-weight:600; border-radius:12px; padding:10px 20px; cursor:pointer; border:1px solid var(--line); background:var(--glass-hi); color:var(--text); text-transform:lowercase; transition:all var(--ease); }
  .tab:hover { border-color:rgba(255,255,255,0.45); transform:translateY(-1px); }
  .tab.on { background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#042430; border-color:transparent; box-shadow:0 8px 24px rgba(68,187,221,0.3); }
  .tab .c, .filt .c { opacity:0.65; font-weight:500; margin-left:2px; }
  .frow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:9px; }
  .frow .lbl { font-size:11.5px; color:var(--muted); letter-spacing:0.5px; margin-right:4px; min-width:58px; }

  .section { margin-bottom:38px; }
  .sec-h { display:flex; align-items:baseline; gap:12px; margin-bottom:4px; }
  .sec-h h2 { font-size:23px; font-weight:600; }
  .sec-h .cnt { font-size:13px; color:var(--cyan); font-weight:600; }
  .sec-sub { font-size:13.5px; color:var(--muted); margin-bottom:18px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:20px; }
  .card {
    background:var(--glass); border:1px solid var(--line); border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column; transition:transform var(--ease),border-color var(--ease),box-shadow var(--ease);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  }
  .card:hover { transform:translateY(-4px); border-color:rgba(255,255,255,0.4); box-shadow:0 24px 60px rgba(0,0,0,0.5); }
  .imgwrap { position:relative; aspect-ratio:1/1.12; background:#15171a; overflow:hidden; }
  .imgwrap img { width:100%; height:100%; object-fit:cover; display:block; transition:transform var(--ease); }
  .card:hover .imgwrap img { transform:scale(1.04); }
  .imgfallback { width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:34px; font-weight:700; color:rgba(255,255,255,0.18); text-transform:uppercase; }
  .badge { position:absolute; top:11px; left:11px; background:var(--cyan); color:#042430; font-size:11.5px; font-weight:700; padding:4px 9px; border-radius:7px; }
  .flag { position:absolute; bottom:11px; left:11px; right:11px; background:rgba(10,10,10,0.82); color:var(--warn); font-size:11.5px; font-weight:500; padding:6px 9px; border-radius:8px; backdrop-filter:blur(6px); }
  .body { padding:14px 15px 16px; display:flex; flex-direction:column; gap:9px; flex:1; }
  .ey { font-size:11px; letter-spacing:0.8px; color:var(--cyan); font-weight:600; }
  .ttl { font-size:14.5px; font-weight:500; line-height:1.3; }
  .price { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .price .now { font-size:17px; font-weight:600; }
  .price .was { font-size:12.5px; color:var(--muted); text-decoration:line-through; }
  .price .off { font-size:11.5px; color:#7ee0b8; font-weight:600; }
  .meta { display:flex; gap:7px; flex-wrap:wrap; }
  .pill { font-size:11px; border:1px solid var(--line); background:var(--glass-hi); border-radius:7px; padding:3px 8px; color:var(--muted); }
  .why { display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
  .why .w { font-size:10.5px; background:rgba(68,187,221,0.12); border:1px solid rgba(68,187,221,0.3); color:#cfeef7; border-radius:6px; padding:3px 7px; }
  .acts { display:flex; gap:8px; margin-top:auto; padding-top:4px; }
  .act { flex:1; display:flex; align-items:center; justify-content:center; gap:5px; font-family:inherit; font-size:12.5px; font-weight:600; border-radius:10px; padding:9px; cursor:pointer; border:1px solid var(--line); background:var(--glass-hi); color:var(--text); transition:all var(--ease); text-transform:lowercase; }
  .act:hover { border-color:rgba(255,255,255,0.4); transform:translateY(-1px); }
  .act.like:hover { border-color:var(--cyan); color:#d9f5fc; }
  .act.pass:hover { border-color:var(--warn); }
  .card[data-sig="like"] { border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan) inset, 0 10px 40px rgba(68,187,221,0.18); }
  .card[data-sig="like"] .act.like { background:var(--cyan); color:#042430; border-color:var(--cyan); }
  .card[data-sig="pass"] { opacity:0.42; }
  .card[data-sig="pass"] .act.pass { background:var(--warn); color:#2a2300; border-color:var(--warn); }
  body.hidepassed .card[data-sig="pass"] { display:none; }
  .sigbar { position:fixed; left:0; right:0; bottom:0; z-index:50; background:linear-gradient(0deg, rgba(10,10,10,0.96), rgba(10,10,10,0.62) 72%, transparent); padding:14px 24px 18px; }
  .sigbar-in { max-width:1080px; margin:0 auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .sigbar .cnt2 { font-size:13.5px; color:var(--muted); }
  .sigbar .cnt2 b { color:var(--cyan); }
  .sigbar .sp { flex:1; }
  .sigbtn { font-family:inherit; font-size:13px; font-weight:600; border-radius:10px; padding:9px 16px; cursor:pointer; border:1px solid var(--line); background:var(--glass-hi); color:var(--text); text-transform:lowercase; transition:all var(--ease); }
  .sigbtn:hover { border-color:rgba(255,255,255,0.45); }
  .sigbtn.on { background:var(--cyan); color:#042430; border-color:var(--cyan); }
  .sigok { font-size:12.5px; color:#7ee0b8; }
  .scanbar { max-width:1080px; margin:9px auto 0; height:3px; border-radius:99px; background:rgba(255,255,255,0.09); overflow:hidden; opacity:0; transition:opacity .3s var(--ease); }
  .scanbar.on { opacity:1; }
  .scanbar-fill { height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,#0077CC,var(--cyan)); transition:width .8s ease; }
  .view {
    margin-top:auto; display:block; text-align:center; text-decoration:none; font-size:13.5px; font-weight:600;
    background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#042430; border-radius:10px; padding:10px; transition:transform var(--ease);
  }
  .view:hover { transform:translateY(-1px); }
  footer { max-width:1080px; margin:10px auto 0; padding:18px 24px; font-size:12px; color:var(--muted); line-height:1.6; }

  /* ---- jump to top ---- */
  #topBtn {
    position:fixed; right:22px; bottom:180px; z-index:60;
    width:44px; height:44px; border-radius:50%;
    border:1px solid var(--line); background:var(--glass-hi);
    color:var(--text); font-size:20px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    opacity:0; transform:translateY(8px); pointer-events:none;
    transition:opacity var(--ease), transform var(--ease), border-color var(--ease), color var(--ease);
  }
  #topBtn.show { opacity:1; transform:translateY(0); pointer-events:auto; }
  #topBtn:hover { border-color:var(--cyan); color:var(--cyan); }

  /* ---- search bar ---- */
  .searchbox { position:relative; margin:0 0 20px; }
  .searchbox input {
    font-family:inherit; font-size:14px; color:var(--text); text-transform:lowercase;
    background:var(--glass-hi); border:1px solid var(--line); border-radius:12px;
    padding:11px 42px 11px 15px; width:100%; outline:none;
    transition:border-color var(--ease); backdrop-filter:blur(18px);
  }
  .searchbox input:focus { border-color:var(--cyan); }
  .searchbox input::placeholder { color:var(--muted); }
  .searchbox .clr {
    position:absolute; right:13px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer;
    padding:4px; display:none;
  }
  .searchbox.has-text .clr { display:block; }
  .searchbox.has-text input { border-color:rgba(68,187,221,0.5); }

  /* ---- scan config bottom sheet ---- */
  .scan-overlay {
    position:fixed; inset:0; z-index:79; background:rgba(0,0,0,0.55);
    opacity:0; pointer-events:none; transition:opacity 350ms ease;
  }
  .scan-overlay.on { opacity:1; pointer-events:auto; }
  .scan-sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:rgba(14,16,20,0.98); border-top:1px solid var(--line);
    border-radius:20px 20px 0 0; padding:22px 22px 38px;
    transform:translateY(100%); transition:transform 380ms cubic-bezier(0.2,0.7,0.2,1);
    backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  }
  .scan-sheet.open { transform:translateY(0); }
  .scan-sheet h3 { font-size:17px; font-weight:600; margin-bottom:18px; }
  .sheet-row { margin-bottom:16px; }
  .sheet-lbl { font-size:11px; color:var(--muted); letter-spacing:0.5px; margin-bottom:8px; display:block; text-transform:uppercase; }
  .sheet-pills { display:flex; gap:8px; flex-wrap:wrap; }
  .src-tog {
    font-family:inherit; font-size:13px; font-weight:600; border-radius:999px;
    padding:7px 14px; cursor:pointer; border:1px solid var(--line);
    background:var(--glass-hi); color:var(--text); text-transform:lowercase;
    transition:all var(--ease);
  }
  .src-tog.on { background:var(--cyan); color:#042430; border-color:var(--cyan); }
  .sheet-input {
    font-family:inherit; font-size:14px; color:var(--text); text-transform:lowercase;
    background:var(--glass-hi); border:1px solid var(--line); border-radius:10px;
    padding:10px 13px; width:100%; outline:none; transition:border-color var(--ease);
  }
  .sheet-input:focus { border-color:var(--cyan); }
  .sheet-input::placeholder { color:var(--muted); }
  .sheet-btns { display:flex; gap:10px; margin-top:22px; }
  .sheet-go {
    flex:1; font-family:inherit; font-size:14px; font-weight:600; text-transform:lowercase;
    cursor:pointer; border:none; border-radius:12px; padding:13px;
    background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#042430;
    transition:transform var(--ease); box-shadow:0 8px 24px rgba(68,187,221,0.28);
  }
  .sheet-go:hover { transform:translateY(-1px); }
  .sheet-go:disabled { opacity:0.5; cursor:default; transform:none; }
  .sheet-close {
    font-family:inherit; font-size:14px; font-weight:600; text-transform:lowercase;
    cursor:pointer; border:1px solid var(--line); border-radius:12px; padding:13px 18px;
    background:var(--glass-hi); color:var(--text); transition:all var(--ease);
  }
  .sheet-close:hover { border-color:rgba(255,255,255,0.4); }
  /* cancel button visible during active scan */
  #cancelScan {
    font-family:inherit; font-size:13px; font-weight:600; border-radius:10px;
    padding:9px 16px; cursor:pointer; border:1px solid var(--warn);
    background:transparent; color:var(--warn); text-transform:lowercase;
    transition:all var(--ease); display:none;
  }
  #cancelScan.show { display:inline-block; }
  #cancelScan:hover { background:rgba(232,194,74,0.12); }

  /* ---- auth gate (Vega look: dark bg, lowercase, blue->cyan gradient button) ---- */
  #auth { display:none; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  #auth.show { display:flex; }
  .authcard {
    width:100%; max-width:400px; background:var(--glass); border:1px solid var(--line); border-radius:20px;
    padding:34px 30px; backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    display:flex; flex-direction:column; gap:16px; text-align:left;
  }
  .authcard .brand { margin-bottom:6px; }
  .authcard h1 { font-size:22px; font-weight:600; }
  .authcard span.tag { display:block; font-size:12px; color:var(--muted); font-weight:400; }
  .authcard p.lead { font-size:13.5px; color:var(--muted); line-height:1.6; }
  .authcard input[type="email"], .authcard input[type="password"] {
    font-family:inherit; font-size:15px; color:var(--text);
    background:var(--glass-hi); border:1px solid var(--line); border-radius:12px; padding:13px 15px; width:100%;
    outline:none; transition:border-color var(--ease);
  }
  .authcard input[type="email"] { text-transform:lowercase; }
  .authcard input[type="email"]:focus, .authcard input[type="password"]:focus { border-color:var(--cyan); }
  .authlink { display:block; margin-top:10px; font-family:inherit; background:none; border:none; cursor:pointer;
    color:var(--muted); font-size:12.5px; text-transform:lowercase; text-decoration:underline; }
  .authlink:hover { color:var(--text); }
  .authbtn {
    font-family:inherit; font-size:15px; font-weight:600; text-transform:lowercase; cursor:pointer;
    background:linear-gradient(135deg,var(--blue),var(--cyan)); color:#042430; border:none; border-radius:12px;
    padding:13px; width:100%; transition:transform var(--ease); box-shadow:0 8px 24px rgba(68,187,221,0.3);
  }
  .authbtn:hover { transform:translateY(-1px); }
  .authbtn:disabled { opacity:0.6; cursor:default; transform:none; }
  .authmsg { font-size:13px; line-height:1.6; color:#7ee0b8; }
  .autherr { font-size:13px; line-height:1.6; color:var(--warn); }
  .signout { font-family:inherit; background:none; border:none; color:var(--muted); font-size:12px; text-transform:lowercase; cursor:pointer; text-decoration:underline; }
  .signout:hover { color:var(--text); }
  #app { display:none; }
  #app.show { display:block; }
</style>
</head>
<body>

<!-- ============================ AUTH GATE ============================ -->
<div id="auth">
  <div class="authcard">
    <div class="brand"><div class="dot"></div><div><h1>vega closet</h1><span class="tag">your feed</span></div></div>
    <div id="authForm">
      <p class="lead">sign in to see today's picks.</p>
      <input type="email" id="authEmail" placeholder="you@email.com" autocomplete="email" />
      <input type="password" id="authPass" placeholder="password" autocomplete="current-password" />
      <button class="authbtn" id="authSend" type="button">sign in</button>
      <button class="authlink" id="authForgot" type="button">forgot password?</button>
      <p class="authmsg" id="authMsg" style="display:none;"></p>
      <p class="autherr" id="authErr" style="display:none;"></p>
    </div>
    <div id="resetForm" style="display:none;">
      <p class="lead">pick a new password for your closet.</p>
      <input type="password" id="resetPass" placeholder="new password (8+ characters)" autocomplete="new-password" />
      <button class="authbtn" id="resetSave" type="button">save new password</button>
      <p class="autherr" id="resetErr" style="display:none;"></p>
    </div>
  </div>
</div>

<!-- ============================ APP / FEED ============================ -->
<div id="app">
  <div class="wrap">
    <header class="top">
      <div class="brand"><div class="dot"></div><div><h1>vega closet</h1><span id="sub">your feed</span></div></div>
      <div class="stat" id="stat"></div>
    </header>
    <div class="note" id="note"></div>
    <div class="filters" id="filters"></div>
    <div class="searchbox" id="searchbox">
      <input type="search" id="searchInput" placeholder="search brand, title, style tag…" autocomplete="off" />
      <button class="clr" id="searchClear" type="button" tabindex="-1">✕</button>
    </div>
    <div id="sections"></div>
    <div id="emptymsg" style="display:none;text-align:center;padding:46px 24px;color:#8b93a7;font-size:15px;line-height:1.55;"></div>
  </div>
  <footer id="foot"></footer>
  <div class="sigbar"><div class="sigbar-in">
    <span class="cnt2" id="sigcnt"></span>
    <span class="sp"></span>
    <button class="sigbtn" id="scanNow" type="button">scan all</button>
    <button class="sigbtn" id="scanFilter" type="button">⊕ filter scan</button>
    <button id="cancelScan" type="button">cancel scan</button>
    <button class="sigbtn" id="hidePass" type="button">hide passed</button>
    <button class="signout" id="signOut" type="button">sign out</button>
    <span class="sigok" id="sigok"></span>
  </div>
  <div class="scanbar" id="scanbar"><div class="scanbar-fill" id="scanfill"></div></div>
  </div>
</div>

<button id="topBtn" title="back to top" aria-label="scroll to top">↑</button>

<!-- scan config overlay + bottom sheet -->
<div class="scan-overlay" id="scanOverlay"></div>
<div class="scan-sheet" id="scanSheet">
  <h3>filter scan</h3>
  <div class="sheet-row">
    <span class="sheet-lbl">sources</span>
    <div class="sheet-pills">
      <button class="src-tog on" data-src="grailed"      type="button">grailed</button>
      <button class="src-tog on" data-src="therealreal"  type="button">the realreal</button>
      <button class="src-tog on" data-src="ssense"       type="button">ssense</button>
    </div>
  </div>
  <div class="sheet-row">
    <span class="sheet-lbl">category</span>
    <div class="sheet-pills">
      <button class="src-tog on" data-cat="all"         type="button">all</button>
      <button class="src-tog"    data-cat="outerwear"   type="button">outerwear</button>
      <button class="src-tog"    data-cat="tops"        type="button">tops</button>
      <button class="src-tog"    data-cat="bottoms"     type="button">bottoms</button>
      <button class="src-tog"    data-cat="footwear"    type="button">footwear</button>
      <button class="src-tog"    data-cat="accessories" type="button">accessories</button>
    </div>
  </div>
  <div class="sheet-row">
    <span class="sheet-lbl">size</span>
    <div class="sheet-pills">
      <button class="src-tog on" data-sz="all"   type="button">all</button>
      <button class="src-tog"    data-sz="l"     type="button">L</button>
      <button class="src-tog"    data-sz="xl"    type="button">XL</button>
      <button class="src-tog"    data-sz="xxl"   type="button">XXL</button>
      <button class="src-tog"    data-sz="w36"   type="button">W36</button>
      <button class="src-tog"    data-sz="w38"   type="button">W38</button>
      <button class="src-tog"    data-sz="us13"  type="button">US 13</button>
      <button class="src-tog"    data-sz="us14"  type="button">US 14</button>
    </div>
  </div>
  <div class="sheet-row">
    <span class="sheet-lbl">keyword · style · color (searches item titles)</span>
    <input class="sheet-input" id="scanQuery" type="text" placeholder="e.g. black leather, cargo, double knee…" autocomplete="off" />
  </div>
  <div class="sheet-row">
    <span class="sheet-lbl">specific brands (blank = your full loved list)</span>
    <input class="sheet-input" id="scanBrands" type="text" placeholder="rick owens, prada, maison margiela…" autocomplete="off" />
  </div>
  <div class="sheet-row">
    <span class="sheet-lbl">min new items</span>
    <input class="sheet-input" id="scanMinNew" type="number" value="50" min="0" max="500" style="max-width:110px;" />
  </div>
  <div class="sheet-btns">
    <button class="sheet-go" id="startScan" type="button">start scan</button>
    <button class="sheet-close" id="closeSheet" type="button">close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ================= SUPABASE CLIENT =================
  const SUPABASE_URL = 'https://opmbwwodxlqktedxuppd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ZH2HPeburUJ0jyARX5Yhyg_j0xbYX25'; // publishable key, safe to ship to the browser
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ================= APP STATE =================
  let USER = null;               // current session.user
  let FEED_RENDERED = false;     // guard so onAuthStateChange doesn't re-render every event
  let sigChannel = null;         // realtime channel handle
  let bootAbort = null;          // tears down boot()'s listeners on sign-out so re-login can't double-attach

  const money = n => "$" + Number(n).toLocaleString();
  const platLabel = { grailed:"grailed", therealreal:"the realreal", ssense:"ssense" };

  // Escape everything scraped (titles/brands come from strangers' listings) before it hits innerHTML.
  const esc = s => String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
  const safeUrl = u => { try { const p = new URL(u); return (p.protocol === "http:" || p.protocol === "https:") ? esc(p.href) : ""; } catch { return ""; } };

  // ================= AUTH GATE (email + password) =================
  const authEl   = document.getElementById("auth");
  const appEl    = document.getElementById("app");
  const authForm = document.getElementById("authForm");

  function showAuth(){ appEl.classList.remove("show"); authEl.classList.add("show"); }
  function showApp(){ authEl.classList.remove("show"); appEl.classList.add("show"); }

  async function doSignIn(){
    const email = (document.getElementById("authEmail").value || "").trim();
    const pass  = document.getElementById("authPass").value || "";
    const errEl = document.getElementById("authErr");
    const btn = document.getElementById("authSend");
    errEl.style.display = "none";
    if (!email || !pass) { errEl.textContent = "enter your email and password."; errEl.style.display = "block"; return; }
    btn.disabled = true; btn.textContent = "signing in…";
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    btn.disabled = false; btn.textContent = "sign in";
    if (error) { errEl.textContent = error.message.toLowerCase(); errEl.style.display = "block"; return; }
    // onAuthStateChange renders the feed from here.
  }
  document.getElementById("authSend").addEventListener("click", doSignIn);
  document.getElementById("authPass").addEventListener("keydown", e => { if (e.key === "Enter") doSignIn(); });

  // ---- forgot password: email a recovery link; the link lands back here and opens the reset form ----
  document.getElementById("authForgot").addEventListener("click", async () => {
    const email = (document.getElementById("authEmail").value || "").trim();
    const errEl = document.getElementById("authErr"), msgEl = document.getElementById("authMsg");
    errEl.style.display = "none"; msgEl.style.display = "none";
    if (!email) { errEl.textContent = "enter your email first, then tap forgot password."; errEl.style.display = "block"; return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
    if (error) { errEl.textContent = error.message.toLowerCase(); errEl.style.display = "block"; return; }
    msgEl.textContent = "reset link sent — check your email and open it on this device.";
    msgEl.style.display = "block";
  });

  // ---- recovery landing: the emailed link signs you in and fires PASSWORD_RECOVERY; show the set-new-password form ----
  function showResetForm(){
    authForm.style.display = "none";
    document.getElementById("resetForm").style.display = "block";
    showAuth();
  }
  document.getElementById("resetSave").addEventListener("click", async () => {
    const pass = document.getElementById("resetPass").value || "";
    const errEl = document.getElementById("resetErr");
    errEl.style.display = "none";
    if (pass.length < 8) { errEl.textContent = "use at least 8 characters."; errEl.style.display = "block"; return; }
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) { errEl.textContent = error.message.toLowerCase(); errEl.style.display = "block"; return; }
    document.getElementById("resetForm").style.display = "none";
    authForm.style.display = "block";
    location.reload();   // recovery session is live — reload boots straight into the feed
  });

  document.getElementById("signOut").addEventListener("click", async () => {
    await sb.auth.signOut();
  });

  // React to session changes (magic-link return, sign-out, token refresh).
  sb.auth.onAuthStateChange((_e, session) => {
    if (_e === "PASSWORD_RECOVERY") { showResetForm(); return; }
    if (session && session.user) {
      USER = session.user;
      showApp();
      if (!FEED_RENDERED) boot(session);
    } else {
      USER = null;
      FEED_RENDERED = false;
      if (bootAbort) { bootAbort.abort(); bootAbort = null; }
      if (sigChannel) { sb.removeChannel(sigChannel); sigChannel = null; }
      authForm.style.display = "block";
      showAuth();
    }
  });

  // Initial check: if a session already exists (or is present in the URL), go straight in.
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data && data.session && data.session.user) {
      USER = data.session.user;
      showApp();
      if (!FEED_RENDERED) boot(data.session);
    } else {
      showAuth();
    }
  })();

  // ================= BOOT: load feed + wire everything (once authed) =================
  async function boot(session){
    FEED_RENDERED = true;
    if (bootAbort) bootAbort.abort();
    bootAbort = new AbortController();
    const LSN = { signal: bootAbort.signal };   // pass to every listener attached below
    const userId = session.user.id;

    // ---- load the feed payload from Supabase ----
    let FEED;
    try {
      const { data, error } = await sb.from('feeds').select('payload').single();
      if (error && error.code !== 'PGRST116') { /* real error (not "no rows") */ console.error(error); }
      FEED = data ? data.payload : null;
    } catch (e) { console.error(e); FEED = null; }
    const noFeed = !FEED || !(FEED.sections && FEED.sections.length);
    const F = FEED || { sections: [], note: '', platforms:{} };
    window.FEED = F;

    // ---- header / note / stat ----
    document.getElementById("sub").textContent = "your feed · " + (F.date || "");
    const total = (F.sections||[]).reduce((a,s)=>a+s.items.filter(i=>!i.isArchived&&!i.isLiked).length,0);
    document.getElementById("stat").innerHTML =
      "<b>" + total + "</b> picks from <b>" + (F.scanned||0) + "</b> scanned<br>" +
      "grailed " + (F.platforms?.grailed||0) + " · realreal " + (F.platforms?.therealreal||0) + " · ssense " + (F.platforms?.ssense||0);
    document.getElementById("note").textContent = noFeed
      ? "no feed yet — run a haul and your picks will show up here."
      : (F.note || "");

    // ---- card markup (VERBATIM from feed.html) ----
    function card(it){
      const pct = Number(it.discountPct) || 0;
      const off = pct ? `<span class="off">${pct}% off</span>` : "";
      const was = it.originalPrice ? `<span class="was">${money(it.originalPrice)}</span>` : "";
      const badge = it.isNew ? `<div class="badge">new</div>` : (pct ? `<div class="badge">${pct}% off</div>` : "");
      const flag = it.flag ? `<div class="flag">${esc(it.flag)}</div>` : "";
      const sizePill = it.size ? `<span class="pill">size ${esc(it.size)}</span>` : "";
      const condPill = it.condition ? `<span class="pill">${esc(it.condition)}</span>` : "";
      const why = (it.reasons||[]).slice(0,4).map(r=>`<span class="w">${esc(r)}</span>`).join("");
      const initial = esc((it.brand||"?").charAt(0));
      const img = safeUrl(it.image), href = safeUrl(it.url);
      const plat = esc(platLabel[it.platform]||it.platform);
      return `<div class="card" data-id="${esc(it.id)}" data-url="${encodeURIComponent(it.url||'')}" data-platform="${esc(it.platform)}" data-cat="${esc(it.category)}" data-sz="${esc(it.sz||'other')}" data-price="${Number(it.price)||0}" data-archived="${it.isArchived?1:0}" data-liked="${it.isLiked?1:0}">
        <div class="imgwrap">
          ${badge}
          <img src="${img}" alt="${esc(it.title)}" loading="lazy" referrerpolicy="no-referrer" decoding="async"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
          <div class="imgfallback">${initial}</div>
          ${flag}
        </div>
        <div class="body">
          <div class="ey">${esc(it.brand)} · ${plat}</div>
          <div class="ttl">${esc(it.title)}</div>
          <div class="price"><span class="now">${money(it.price)}</span>${was}${off}</div>
          <div class="meta">${sizePill}${condPill}<span class="pill">${esc(it.category)}</span></div>
          <div class="why">${why}</div>
          <div class="acts">
            <button class="act like" data-act="like" type="button">♥ love</button>
            <button class="act pass" data-act="pass" type="button">✕ pass</button>
          </div>
          <a class="view" href="${href}" target="_blank" rel="noopener">view on ${plat}</a>
        </div>
      </div>`;
    }

    document.getElementById("sections").innerHTML = (F.sections||[]).map(sec => `
      <div class="section">
        <div class="sec-h"><h2>${esc(sec.title)}</h2><span class="cnt">${sec.items.length}</span></div>
        <div class="sec-sub">${esc(sec.subtitle||"")}</div>
        <div class="grid">${sec.items.map(card).join("")}</div>
      </div>`).join("");

    // Build ITEM_OF here (before filter setup) so applyFilters() can reference it
    const ITEM_OF = {};
    (F.sections||[]).forEach(s=>s.items.forEach(it=>{ ITEM_OF[it.url]=it; }));

    // ---- tabs + filters ----
    const VIEW = { status:"feed", cat:"all", sz:"all", price:"all", plat:"all", sort:"default" };
    let SEARCH_Q = "";
    const cards = () => [...document.querySelectorAll(".card")];
    const STAT  = [["feed","feed"],["liked","liked"],["archived","archived"],["all","all"]];
    const CATS  = [["all","all"],["outerwear","outerwear"],["tops","tops"],["pants","bottoms"],["shoes","footwear"],["accessories","accessories"]];
    const PLATS = [["all","all"],["grailed","grailed"],["the realreal","therealreal"],["ssense","ssense"]];
    const PRICES= [["all","all"],["under $200","0-200"],["$200–500","200-500"],["$500–1k","500-1000"],["$1k+","1000-"]];
    const SORTS = [["relevance","default"],["newest action","date-desc"],["price ↑","price-asc"],["price ↓","price-desc"]];
    const szSeen = new Set(cards().map(c=>c.dataset.sz));
    const SIZES = [["all","all"],["L","L"],["XL","XL"],["XXL","XXL"],["w 36","w36"],["w 38","w38"],["us 13","us13"],["us 14","us14"],["eu 47-49","eu47-49"]].filter(([l,v])=>v==="all"||szSeen.has(v));
    function statusMatch(c,s){
      if (s==="liked")    return c.dataset.liked==="1";
      if (s==="archived") return c.dataset.archived==="1";
      if (s==="all")      return true;                                   // everything: feed + liked + archived
      return c.dataset.archived==="0" && c.dataset.liked==="0";          // feed = not yet acted on
    }
    function inPrice(c,val){ const p=+(c.dataset.price||0); const a=+val.split("-")[0], bs=val.split("-")[1]; return p>=a && p<(bs===""?Infinity:+bs); }
    function dimMatch(dim,val,c){
      if (dim==="status") return statusMatch(c,val);
      if (val==="all")    return true;
      if (dim==="cat")    return c.dataset.cat===val;
      if (dim==="plat")   return c.dataset.platform===val;
      if (dim==="sz")     return c.dataset.sz===val;
      if (dim==="price")  return inPrice(c,val);
      return true;
    }
    const DIMS = ["status","cat","sz","price","plat"];
    function matchExcept(c,except){ for (const d of DIMS){ if (d===except) continue; if (!dimMatch(d,VIEW[d],c)) return false; } return true; }
    function chipCount(dim,val){ return cards().filter(c=>matchExcept(c,dim)&&dimMatch(dim,val,c)).length; }
    function renderFilters(){
      const chip = (l,v,k)=>`<button class="filt${VIEW[k]===v?" on":""}" data-g="${k}" data-v="${v}">${l} <span class="c">${chipCount(k,v)}</span></button>`;
      const chipS= (l,v)=>`<button class="filt${VIEW.sort===v?" on":""}" data-g="sort" data-v="${v}">${l}</button>`;
      document.getElementById("filters").innerHTML =
        `<div class="frow"><span class="lbl">show</span>${STAT.map(([l,v])=>chip(l,v,"status")).join("")}</div>` +
        `<div class="frow"><span class="lbl">category</span>${CATS.map(([l,v])=>chip(l,v,"cat")).join("")}</div>` +
        `<div class="frow"><span class="lbl">size</span>${SIZES.map(([l,v])=>chip(l,v,"sz")).join("")}</div>` +
        `<div class="frow"><span class="lbl">price</span>${PRICES.map(([l,v])=>chip(l,v,"price")).join("")}</div>` +
        `<div class="frow"><span class="lbl">source</span>${PLATS.map(([l,v])=>chip(l,v,"plat")).join("")}</div>` +
        `<div class="frow"><span class="lbl">sort</span>${SORTS.map(([l,v])=>chipS(l,v)).join("")}</div>`;
    }
    function applySort(visibleCards){
      if (VIEW.sort === "default") return;
      document.querySelectorAll(".section").forEach(sec=>{
        const grid = sec.querySelector(".grid"); if (!grid) return;
        const secCards = visibleCards.filter(c => c.closest(".section") === sec);
        if (secCards.length < 2) return;
        secCards.sort((a,b)=>{
          if (VIEW.sort==="date-desc"){
            const ta = SIG_TS[decodeURIComponent(a.dataset.url||"")] || "0";
            const tb = SIG_TS[decodeURIComponent(b.dataset.url||"")] || "0";
            return tb.localeCompare(ta);
          }
          if (VIEW.sort==="price-asc")  return (+a.dataset.price||0) - (+b.dataset.price||0);
          if (VIEW.sort==="price-desc") return (+b.dataset.price||0) - (+a.dataset.price||0);
          return 0;
        });
        secCards.forEach(c=>grid.appendChild(c));
      });
    }
    function applyFilters(){
      const q = SEARCH_Q.toLowerCase().trim();
      let shown = 0;
      const visibleCards = [];
      cards().forEach(c=>{
        const url = decodeURIComponent(c.dataset.url||"");
        const it = ITEM_OF[url] || {};
        const textOk = !q || [(it.brand||""),(it.title||""),...(it.reasons||[])].join(" ").toLowerCase().includes(q);
        const v = textOk && matchExcept(c,null);
        c.style.display = v ? "" : "none";
        if(v){ shown++; visibleCards.push(c); }
      });
      document.querySelectorAll(".section").forEach(sec=>{
        const vis = [...sec.querySelectorAll(".card")].filter(c=>c.style.display!=="none").length;
        sec.style.display = vis ? "" : "none";
        const cnt = sec.querySelector(".cnt"); if (cnt) cnt.textContent = vis;
      });
      applySort(visibleCards);
      const st=document.getElementById("stat"); if(st) st.innerHTML = "<b>"+shown+"</b> shown of <b>"+(F.scanned||0)+"</b> tracked";
      const em=document.getElementById("emptymsg");
      if (em){
        if (shown===0){ em.style.display="block";
          em.textContent = q ? "no results for \""+SEARCH_Q+"\". try a different search."
                         : VIEW.status==="feed"     ? "you're all caught up. tap scan now for fresh pieces, or 'all' to browse everything you've saved."
                         : VIEW.status==="liked"    ? "nothing loved here yet."
                         : VIEW.status==="archived" ? "nothing passed here yet." : "nothing here yet."; }
        else em.style.display="none";
      }
      renderFilters();
    }
    document.getElementById("filters").addEventListener("click", e=>{
      const b=e.target.closest("[data-g]"); if(!b) return;
      VIEW[b.dataset.g] = b.dataset.v;
      applyFilters();
    }, LSN);
    // search bar
    const searchBox = document.getElementById("searchbox");
    const searchIn  = document.getElementById("searchInput");
    const searchClr = document.getElementById("searchClear");
    searchIn.addEventListener("input", ()=>{
      SEARCH_Q = searchIn.value;
      searchBox.classList.toggle("has-text", !!SEARCH_Q);
      applyFilters();
    }, LSN);
    searchClr.addEventListener("click", ()=>{
      searchIn.value = ""; SEARCH_Q = "";
      searchBox.classList.remove("has-text");
      applyFilters(); searchIn.focus();
    }, LSN);
    applyFilters();

    document.getElementById("foot").textContent =
      "vega closet · prices and availability change, tap through to confirm on the platform · love and pass train your next run.";

    // ---- like / pass training signals -> SUPABASE (replaces localStorage + export) ----
    // In-memory signal state keyed by url
    const SIG    = {};   // url -> action ("liked"|"passed")
    const SIG_TS = {};   // url -> ISO timestamp of when action was taken (for date sort)
    function actOf(url){ return SIG[url] || ""; }
    function sigTag(url){ const a=actOf(url); return a==="liked" ? "like" : a==="passed" ? "pass" : ""; }

    // Seed from LIVE signals table (source of truth), paginated past the 1000-row cap.
    for (let from=0; from<40000; from+=1000){
      const { data: rows, error } = await sb.from('signals').select('url,action,created_at').eq('user_id', userId).range(from, from+999);
      if (error){ console.error(error); break; }
      (rows||[]).forEach(r=>{ if(r.url){ SIG[r.url]=r.action; if(r.created_at) SIG_TS[r.url]=r.created_at; } });
      if (!rows || rows.length < 1000) break;
    }

    function applyStates(){
      document.querySelectorAll(".card").forEach(c=>{
        const url = decodeURIComponent(c.dataset.url||"");
        const a = actOf(url);
        if (a==="liked")      { c.dataset.liked="1"; c.dataset.archived="0"; }   // honor prior taps on load
        else if (a==="passed"){ c.dataset.archived="1"; c.dataset.liked="0"; }
        else                  { c.dataset.liked="0";   c.dataset.archived="0"; } // live tally says untouched -> unreviewed
        c.dataset.sig = sigTag(url);
      });
    }
    function updateSigBar(){
      let l=0,p=0; Object.values(SIG).forEach(a=>{ if(a==="liked") l++; else if(a==="passed") p++; });
      document.getElementById("sigcnt").innerHTML = "♥ <b>"+l+"</b> loved · ✕ <b>"+p+"</b> passed";
    }

    // Tap handler: optimistic UI first (identical feel), then persist to Supabase.
    document.getElementById("sections").addEventListener("click", async e=>{
      const btn=e.target.closest(".act"); if(!btn) return;
      const cardEl=btn.closest(".card");
      const url = decodeURIComponent(cardEl.dataset.url||"");  if(!url) return;   // the card's OWN url (ids collide across sources)
      const it = ITEM_OF[url] || {brand:"", category:cardEl.dataset.cat||"", price:(+cardEl.dataset.price)||null, reasons:[]};

      const want = btn.dataset.act==="like" ? "liked" : "passed";
      const prev = SIG[url];
      let next;                                  // '' means toggled OFF (returns to feed)
      if (prev===want) next = "";                // tapping the active action toggles it off
      else next = want;                          // sets (or switches) the action

      // ---- optimistic UI (same as feed.html: move between tabs + update sig) ----
      if (next){ SIG[url] = next; SIG_TS[url] = new Date().toISOString(); } else { delete SIG[url]; delete SIG_TS[url]; }
      cardEl.dataset.sig = sigTag(url);
      cardEl.dataset.liked   = SIG[url]==="liked"  ? "1" : "0";
      cardEl.dataset.archived= SIG[url]==="passed" ? "1" : "0";
      updateSigBar();
      applyFilters();                            // loved -> jumps to liked tab and leaves the feed

      // ---- persist ----
      document.getElementById("sigok").textContent = "";
      try {
        if (next) {
          const { error } = await sb.from('signals').upsert({
            user_id: userId, url, action: next,
            brand: it.brand, category: it.category, reasons: it.reasons||[], price: it.price
          }, { onConflict: 'user_id,url' });
          if (error) throw error;
        } else {
          const { error } = await sb.from('signals').delete().match({ user_id: userId, url });
          if (error) throw error;
        }
      } catch (err) {
        console.error(err);
        // roll back optimistic state on failure
        if (prev) SIG[url] = prev; else delete SIG[url];
        cardEl.dataset.sig = sigTag(url);
        cardEl.dataset.liked   = SIG[url]==="liked"  ? "1" : "0";
        cardEl.dataset.archived= SIG[url]==="passed" ? "1" : "0";
        updateSigBar();
        applyFilters();
        document.getElementById("sigok").textContent = "couldn't save — try again";
      }
    }, LSN);

    document.getElementById("hidePass").onclick=function(){ document.body.classList.toggle("hidepassed"); this.classList.toggle("on"); };

    // ---- scan sheet + cancel ----
    let SCAN_IV = null, SCAN_TICK = null;

    const scanSheet    = document.getElementById("scanSheet");
    const scanOverlay  = document.getElementById("scanOverlay");
    const scanNowBtn   = document.getElementById("scanNow");
    const scanFilterBtn= document.getElementById("scanFilter");
    const cancelBtn    = document.getElementById("cancelScan");

    function openSheet(){ scanSheet.classList.add("open"); scanOverlay.classList.add("on"); }
    function closeSheet(){ scanSheet.classList.remove("open"); scanOverlay.classList.remove("on"); }

    // "scan all" fires immediately with full defaults
    scanNowBtn.addEventListener("click", ()=>{ if(!SCAN_IV) fireScan({}); }, LSN);
    // "filter scan" opens the config sheet
    scanFilterBtn.addEventListener("click", ()=>{ if(!SCAN_IV) openSheet(); }, LSN);
    document.getElementById("closeSheet").addEventListener("click", closeSheet, LSN);
    scanOverlay.addEventListener("click", closeSheet, LSN);

    // source toggles: multi-select (any combination)
    document.querySelectorAll("[data-src]").forEach(b=>{
      b.addEventListener("click", ()=>b.classList.toggle("on"), LSN);
    });

    // category + size: single-select within group
    function singleSelect(group){
      document.querySelectorAll("[data-"+group+"]").forEach(b=>{
        b.addEventListener("click", ()=>{
          document.querySelectorAll("[data-"+group+"]").forEach(x=>x.classList.remove("on"));
          b.classList.add("on");
        }, LSN);
      });
    }
    singleSelect("cat"); singleSelect("sz");

    cancelBtn.addEventListener("click", ()=>{
      if (SCAN_IV){ clearInterval(SCAN_IV); SCAN_IV=null; }
      if (SCAN_TICK){ clearInterval(SCAN_TICK); SCAN_TICK=null; }
      const bar=document.getElementById("scanbar"), fill=document.getElementById("scanfill");
      scanNowBtn.disabled=false; scanNowBtn.textContent="scan all";
      scanFilterBtn.disabled=false;
      cancelBtn.classList.remove("show");
      bar.classList.remove("on"); setTimeout(()=>{ fill.style.width="0%"; },350);
      document.getElementById("sigok").textContent="scan cancelled";
      setTimeout(()=>{ document.getElementById("sigok").textContent=""; },3000);
    }, LSN);

    document.getElementById("startScan").addEventListener("click", ()=>{
      const srcs   = [...document.querySelectorAll("[data-src].on")].map(b=>b.dataset.src).join(",");
      const ok     = document.getElementById("sigok");
      if (!srcs){ ok.textContent="pick at least one source"; return; }
      const cat    = document.querySelector("[data-cat].on")?.dataset.cat || "all";
      const sz     = document.querySelector("[data-sz].on")?.dataset.sz  || "all";
      const query  = (document.getElementById("scanQuery").value||"").trim();
      const brands = (document.getElementById("scanBrands").value||"").trim();
      const minNew = parseInt(document.getElementById("scanMinNew").value||"50",10);
      closeSheet();
      fireScan({ srcs, cat, sz, query, brands, minNew });
    }, LSN);

    async function fireScan({ srcs, cat, sz, query, brands, minNew }={}){
      const ok   = document.getElementById("sigok");
      const bar  = document.getElementById("scanbar"), fill=document.getElementById("scanfill");
      const src  = srcs || "grailed,therealreal,ssense";
      const mn   = minNew ?? 50;

      scanNowBtn.disabled=true; scanNowBtn.textContent="scanning…";
      scanFilterBtn.disabled=true;
      cancelBtn.classList.add("show");
      ok.textContent="scanning "+src+" for fresh picks… (~10-15 min)";
      bar.classList.add("on"); fill.style.width="2%";

      const EST=13*60*1000, t0=Date.now();
      SCAN_TICK=setInterval(()=>{ fill.style.width=Math.min(90,90*(1-Math.exp(-(Date.now()-t0)/(EST*0.6)))).toFixed(1)+"%"; },800);

      const done=(finished)=>{
        if(SCAN_TICK){ clearInterval(SCAN_TICK); SCAN_TICK=null; }
        if(finished){ fill.style.width="100%"; }
        else { bar.classList.remove("on"); setTimeout(()=>{ fill.style.width="0%"; },350); }
        scanNowBtn.disabled=false; scanNowBtn.textContent="scan all";
        scanFilterBtn.disabled=false;
        cancelBtn.classList.remove("show");
      };

      let before=null;
      try { const {data:f0}=await sb.from('feeds').select('built_at').single(); before=f0&&f0.built_at; } catch(e){}

      const rpcParams = { p_sources: src, p_min_new: mn };
      if (brands) rpcParams.p_brands  = brands;
      if (query)  rpcParams.p_query   = query;
      const { data: disp, error } = await sb.rpc('run_conductor', rpcParams);
      if (error){ ok.textContent="couldn't start scan"; done(false); return; }

      // pg_net fires and forgets — confirm GitHub actually accepted the dispatch (204),
      // otherwise a dead token / renamed workflow means we'd poll forever on "started".
      if (typeof disp === "string" && disp.startsWith("queued:")){
        const reqId = +disp.slice(7);
        const checkDispatch = async (attempt)=>{
          try {
            const { data: d } = await sb.rpc('check_dispatch', { p_req: reqId });
            if (d && d.status != null){
              if (d.status < 200 || d.status >= 300){
                if (SCAN_IV){ clearInterval(SCAN_IV); SCAN_IV=null; }
                done(false);
                ok.textContent = "scan didn't start (github said " + d.status + ") — token or workflow issue";
              }
              return;                                  // 2xx: dispatch confirmed, let the poll run
            }
            if (attempt < 3) setTimeout(()=>checkDispatch(attempt+1), 8000);  // still pending — try again
          } catch(e){}
        };
        setTimeout(()=>checkDispatch(1), 8000);
      }

      let tries=0;
      SCAN_IV=setInterval(async ()=>{
        tries++;
        try {
          const {data:f}=await sb.from('feeds').select('built_at').single();
          if (f && f.built_at && f.built_at!==before){
            clearInterval(SCAN_IV); SCAN_IV=null; done(true);
            ok.textContent="fresh picks in — reloading"; setTimeout(()=>location.reload(),1400); return;
          }
        } catch(e){}
        if (tries>=72){ clearInterval(SCAN_IV); SCAN_IV=null; done(false); ok.textContent="still scanning — pull to refresh shortly"; }
      },15000);
    }

    applyStates(); updateSigBar();
    applyFilters();

    // ---- jump to top (wired after render so button exists) ----
    const topBtn = document.getElementById("topBtn");
    window.addEventListener("scroll", () => topBtn.classList.toggle("show", window.scrollY > 320), { passive: true, signal: bootAbort.signal });
    topBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }), LSN);

    // ---- REALTIME: reconcile signals across devices (don't fight local optimistic state) ----
    if (sigChannel) { sb.removeChannel(sigChannel); sigChannel = null; }
    sigChannel = sb.channel('sig')
      .on('postgres_changes',
        { event:'*', schema:'public', table:'signals', filter:'user_id=eq.'+userId },
        payload => {
          const row = payload.new || payload.old; if (!row || !row.url) return;
          const url = row.url;
          if (payload.eventType === 'DELETE') { delete SIG[url]; delete SIG_TS[url]; }
          else { SIG[url] = row.action; SIG_TS[url] = row.created_at || new Date().toISOString(); }
          // reflect on the matching card (if it's in this feed), then refresh views
          document.querySelectorAll(".card").forEach(c=>{
            if (decodeURIComponent(c.dataset.url||"") !== url) return;
            c.dataset.liked    = SIG[url]==="liked"  ? "1" : "0";
            c.dataset.archived = SIG[url]==="passed" ? "1" : "0";
            c.dataset.sig      = sigTag(url);
          });
          updateSigBar();
          applyFilters();
        })
      .subscribe();
  }
</script>
</body>
</html>
